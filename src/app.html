<!DOCTYPE html>
<html lang="%lang%">
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">

	<!-- JSON-LD for better SEO (the description/title/url meta are injected per page by the app) -->
	<script type="application/ld+json">
		{
			"@context": "https://schema.org",
			"@type": "WebSite",
			"name": "Paldle",
			"url": "https://paldle.gg",
			"description": "Paldle is the daily Palworld guessing game — guess the Pal of the day.",
			"inLanguage": "en"
		}
	</script>

	<!-- Favicon -->
	<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml">
	<link rel="icon" href="%sveltekit.assets%/favicon.png" sizes="32x32" type="image/png">

	<!-- AllDle SDK — enables progression tracking when embedded in AllDle -->
	<script src="https://cdn.alldle.net/sdk.js"></script>

	<!-- Privacy-friendly analytics by Plausible -->
	<script async src="https://analytics.rematchtracker.com/js/pa-unKUw2aQyZHkNFFQlk-tM.js"></script>
	<script>
		window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
		plausible.init()
	</script>

	<!-- Fonts -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<!-- Palworld's UI font: Noto Sans (Ft_PalDefaultFont) + Oxanium for numbers (both OFL) -->
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800;900&family=Oxanium:wght@400;500;600;700&display=swap" rel="stylesheet">

	<!-- Dark mode protection -->
	<meta name="darkreader-lock">

	<!-- Open Graph / Twitter (site-level; per-page title, description & url are injected by the app) -->
	<meta property="og:type" content="website">
	<meta property="og:site_name" content="Paldle">
	<meta property="og:image" content="https://paldle.gg/og-image.png">
	<meta property="og:image:width" content="1200">
	<meta property="og:image:height" content="630">
	<meta property="og:image:alt" content="Paldle — the daily Palworld guessing game">
	<meta name="twitter:card" content="summary_large_image">
	<meta name="twitter:image" content="https://paldle.gg/og-image.png">

	<!-- PWA -->
	<meta name="theme-color" content="#1a6ea6">
	<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png">

	<!-- Critical CSS -->
	<style>
		body {
			height: 100dvh;
			overflow: hidden;
			margin: 0;
			padding: 0;
		}

		body > #svelte-root {
			height: 100%;
			overflow-y: scroll;
			overflow-x: hidden;
		}

		noscript div {
			display: flex;
			align-items: center;
			justify-content: center;
			height: 100vh;
		}
	</style>

	%sveltekit.head%
</head>
<body data-sveltekit-preload-data="hover">
<div id="svelte-root">%sveltekit.body%</div>

<noscript>
	<div>
		<p>Please enable JavaScript to play Paldle</p>
	</div>
</noscript>
</body>
</html>
